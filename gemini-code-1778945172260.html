<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Rutas y Altimetría Sincronizada (Persistente iOS)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* Estilos de fijación de pantalla para Safari Mobile */
        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            position: fixed;
            width: 100%;
            -webkit-text-size-adjust: 100%;
            touch-action: manipulation;
        }
        #map { 
            height: calc(100vh - 64px); 
            width: 100%; 
        }
        /* Desplazamiento elástico nativo de Apple para el historial */
        #contenedor-historial {
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body class="bg-slate-50 flex flex-col h-screen overflow-hidden">

    <nav class="bg-blue-800 text-white shadow-lg h-16 flex-none z-[3000]">
        <div class="max-w-7xl mx-auto h-full px-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <span class="text-2xl">🌍</span>
                <span class="text-md font-bold tracking-wide uppercase">Rutas por el Mundo</span>
            </div>
            <div class="space-x-4 text-sm">
                <button onclick="cambiarPestaña('mapa')" id="btn-mapa" class="border-b-2 border-white pb-1 font-medium">Mapa</button>
                <button onclick="cambiarPestaña('perfil')" id="btn-perfil" class="border-b-2 border-transparent pb-1 font-medium text-blue-200">Perfil</button>
            </div>
        </div>
    </nav>

    <main class="flex-grow relative">
        
        <section id="vista-mapa" class="absolute inset-0 z-10 block">
            <div class="absolute top-4 right-4 z-[1000] flex flex-col space-y-2 items-end">
                <button id="btn-iniciar" onclick="iniciarRuta()" class="bg-blue-600 text-white font-bold py-3 px-4 rounded-xl shadow-lg active:bg-blue-700 text-sm">
                    ▶️ Iniciar Ruta
                </button>
                <button id="btn-finalizar" onclick="finalizarRuta()" class="bg-rose-600 text-white font-bold py-3 px-4 rounded-xl shadow-lg active:bg-rose-700 text-sm hidden">
                    ⏹️ Finalizar
                </button>
            </div>

            <div id="panel-estadisticas" class="absolute bottom-4 left-4 z-[1000] bg-slate-900/95 text-white p-4 rounded-2xl shadow-xl border border-slate-700 hidden space-y-2 min-w-[200px]">
                <div class="flex items-center justify-between space-x-4 border-b border-slate-800 pb-1">
                    <span class="text-xs text-slate-400 font-medium">Tiempo:</span>
                    <span id="display-tiempo" class="font-mono text-sm font-bold text-emerald-400">00:00:00</span>
                </div>
                <div class="flex items-center justify-between space-x-4 border-b border-slate-800 pb-1">
                    <span class="text-xs text-slate-400 font-medium">Distancia:</span>
                    <span id="display-distancia" class="font-mono text-sm font-bold text-sky-400">0.00 km</span>
                </div>
                <div class="flex items-center justify-between space-x-4 border-b border-slate-800 pb-1">
                    <span class="text-xs text-slate-
